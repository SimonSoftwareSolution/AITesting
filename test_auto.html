<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">

    <style>
      .loading {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }
      .loading circle {
        stroke: #ee8509;
        stroke-dasharray: 80px, 200px;
        stroke-dashoffset: 0;
        animation: circular-progress-circle-animation 1.4s ease-in-out infinite;
      }

      .loading .circular-progress {
        display: inline-block;
        animation: circular-progress-root-animation 1.4s linear infinite;
      }

      @keyframes circular-progress-circle-animation {
        0% {
          stroke-dasharray: 1px, 200px;
          stroke-dashoffset: 0;
        }

        50% {
          stroke-dasharray: 100px, 200px;
          stroke-dashoffset: -15px;
        }

        100% {
          stroke-dasharray: 100px, 200px;
          stroke-dashoffset: -125px;
        }
      }
      @keyframes circular-progress-root-animation {
        0% {
          -webkit-transform: rotate(0deg);
          -moz-transform: rotate(0deg);
          -ms-transform: rotate(0deg);
          transform: rotate(0deg);
        }

        100% {
          -webkit-transform: rotate(360deg);
          -moz-transform: rotate(360deg);
          -ms-transform: rotate(360deg);
          transform: rotate(360deg);
        }
      }
    </style>
